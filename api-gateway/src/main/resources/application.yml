server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      routes:
        # Root path
        - id: auth-service-root
          uri: http://auth-service:8081
          predicates:
            - Path=/
          filters:
            - PreserveHostHeader=

        # Order Service routes
        - id: order-service-orders
          uri: http://order-service:8082
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=0
            - PreserveHostHeader=
        
        - id: order-service-reports
          uri: http://order-service:8082
          predicates:
            - Path=/api/reports/**
          filters:
            - StripPrefix=0
            - PreserveHostHeader=

        # File Service routes
        - id: file-service-files
          uri: http://file-service:8083
          predicates:
            - Path=/api/files/**
          filters:
            - StripPrefix=0
            - PreserveHostHeader=

        # Auth Service API endpoints - catch-all for remaining /api/**
        - id: auth-service-api
          uri: http://auth-service:8081
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=0
            - PreserveHostHeader=
      
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "${FRONTEND_URL:http://localhost:3000}"
              - "${APP_URL:http://localhost:8080}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
  
  data:
    redis:
      host: redis
      port: 6379
      password: 
      timeout: 60000

# JWT Configuration (must match auth-service)
jwt:
  secret: ${JWT_SECRET:your-super-secret-key-change-this-in-production-min-256-bits}
